<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f26c3c, #ff8a5c);
            min-height: 100vh;
        }

        .navbar-custom {
            background-color: #1f252b;
            padding: 10px 18px;
        }

        .navbar-brand-custom {
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
        }

        .nav-btn {
            background-color: #27c2f1;
            color: black;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            text-decoration: none;
            margin-left: 8px;
            font-size: 14px;
        }

        .main-wrapper {
            min-height: calc(100vh - 56px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .result-card {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
            padding: 40px 30px;
            text-align: center;
        }

        .result-title {
            font-size: 32px;
            font-weight: bold;
            color: #1f252b;
            margin-bottom: 15px;
        }

        .result-subtitle {
            font-size: 18px;
            color: #444;
            margin-bottom: 25px;
        }

        .prediction-badge {
            display: inline-block;
            background: #1f252b;
            color: white;
            font-size: 30px;
            font-weight: bold;
            padding: 14px 28px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .info-box {
            background: #f4f7fb;
            border-left: 6px solid #27c2f1;
            border-radius: 10px;
            padding: 16px;
            margin: 20px auto 30px auto;
            text-align: left;
            max-width: 520px;
            color: #333;
            font-size: 15px;
        }

        .action-buttons {
            margin-top: 10px;
        }

        .btn-custom {
            padding: 10px 22px;
            font-size: 15px;
            border-radius: 8px;
            margin: 6px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-try {
            background-color: #28a745;
            color: white;
        }

        .btn-home {
            background-color: #27c2f1;
            color: black;
        }
    </style>
</head>
<body>

    <nav class="navbar-custom d-flex justify-content-between align-items-center">
        <a href="/" class="navbar-brand-custom">Employee Productivity Prediction Using ML</a>
        <div>
            <a href="/" class="nav-btn">Home</a>
            <a href="/about" class="nav-btn">About</a>
            <a href="/predict" class="nav-btn">Predict</a>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="result-card">
            <div class="result-title">Prediction Result</div>
            <div class="result-subtitle">Based on the given employee details, the predicted productivity is:</div>

            <div class="prediction-badge">
                {{ prediction }}
            </div>

            <div class="info-box">
                This prediction was generated using the best-performing trained machine learning model from the project pipeline.
            </div>

            <div class="action-buttons">
                <a href="/predict" class="btn-custom btn-try">Try Again</a>
                <a href="/" class="btn-custom btn-home">Go to Home</a>
            </div>
        </div>
    </div>

</body>
</html>
